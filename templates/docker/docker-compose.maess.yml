services:
  mongodb:
    image: mongo:8
    container_name: maess-memory-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "${MONGO_INITDB_ROOT_USERNAME}",
          "--password",
          "${MONGO_INITDB_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  host:
    image: ghcr.io/maess-memory/core:latest
    container_name: maess-memory-host
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${HOST_HTTP_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      MongoDb__ConnectionString: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      MongoDb__DatabaseName: ${MONGO_DATABASE}
      DataProtection__ApplicationName: ${DATA_PROTECTION_APPLICATION_NAME:-Maess.Memory.Presentation.Host}
      DataProtection__KeysPath: ${DATA_PROTECTION_KEYS_PATH:-/var/lib/maess-memory/data-protection-keys}
      DataProtection__CertificatePath: ${DATA_PROTECTION_CERTIFICATE_PATH:-}
      DataProtection__CertificatePassword: ${DATA_PROTECTION_CERTIFICATE_PASSWORD:-}
      BOOTSTRAP_ADMIN_TENANT_NOME: ${BOOTSTRAP_ADMIN_TENANT_NOME}
      BOOTSTRAP_ADMIN_TENANT_EMAIL_CONTATO: ${BOOTSTRAP_ADMIN_TENANT_EMAIL_CONTATO}
      BOOTSTRAP_ADMIN_TENANT_TELEFONE_CONTATO: ${BOOTSTRAP_ADMIN_TENANT_TELEFONE_CONTATO}
      BOOTSTRAP_ADMIN_USUARIO_EMAIL: ${BOOTSTRAP_ADMIN_USUARIO_EMAIL}
      BOOTSTRAP_ADMIN_USUARIO_NOME: ${BOOTSTRAP_ADMIN_USUARIO_NOME}
      BOOTSTRAP_ADMIN_USUARIO_SECRET: ${BOOTSTRAP_ADMIN_USUARIO_SECRET}
      BOOTSTRAP_ADMIN_USUARIO_APIKEY: ${BOOTSTRAP_ADMIN_USUARIO_APIKEY}
      MAESS_ENV: ${MAESS_ENV}
      MAESS_PLAN: ${MAESS_PLAN}
    volumes:
      - data_protection_keys:${DATA_PROTECTION_KEYS_PATH:-/var/lib/maess-memory/data-protection-keys}
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:8080/health',
            timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongodb_data:
  data_protection_keys:
